<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1200" viewBox="0 0 1100 1200">
<defs>
  <pattern id="maAppaBrickRain" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
    <rect width="38" height="18" fill="#5A2A18" opacity="0.4"/>
    <path d="M0,18 H40" stroke="#2A1508" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <linearGradient id="bgRA" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1A2030"/>
    <stop offset="100%" stop-color="#0E1520"/>
  </linearGradient>
  <linearGradient id="bgPage" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#E8E4DC"/>
    <stop offset="100%" stop-color="#D8D0C4"/>
  </linearGradient>
  <radialGradient id="lampWarm" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFB347" stop-opacity="0.95"/>
    <stop offset="50%" stop-color="#FF8C00" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="dreamGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#E8E0F8" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#C0B8E0" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background page -->
<rect width="1100" height="1200" fill="url(#bgPage)"/>
<rect x="0" y="0" width="1100" height="6" fill="#2A3A50"/>
<rect x="0" y="1194" width="1100" height="6" fill="#2A3A50"/>

<!-- Header -->
<rect x="0" y="0" width="1100" height="90" fill="#0E1520"/>
<text x="550" y="38" font-family="Georgia, serif" font-size="26" fill="#9BB3CC" text-anchor="middle" letter-spacing="5">RAIN ALLEY &amp; COURTYARD (ACT 3)</text>
<text x="550" y="66" font-family="Georgia, serif" font-size="13" fill="#506070" text-anchor="middle" letter-spacing="3">MALLA-ERA EXTERIOR — RED BRICK &amp; SAL WOOD</text>

<!-- ══════════════════════ MAIN SCENE VIEW ══════════════════════ -->
<rect x="20" y="105" width="700" height="500" rx="4" fill="url(#bgRA)"/>

<!-- LEFT WALL - Ma-Appa and Stone -->
<rect x="20" y="105" width="110" height="500" fill="#2A1A08"/>
<rect x="20" y="105" width="110" height="500" fill="url(#maAppaBrickRain)" opacity="0.6"/>
<!-- Carved 'Tundal' (roof strut) hints at top -->
<path d="M130,105 L150,140 L130,150 Z" fill="#1A0A00" opacity="0.8"/>
<path d="M130,180 L150,215 L130,225 Z" fill="#1A0A00" opacity="0.8"/>

<!-- RIGHT STONE WALL -->
<rect x="610" y="105" width="110" height="500" fill="#2A1A08"/>
<rect x="610" y="105" width="110" height="500" fill="url(#maAppaBrickRain)" opacity="0.6"/>
<path d="M610,105 L590,140 L610,150 Z" fill="#1A0A00" opacity="0.8"/>

<!-- BACK WALL with heavy door (Sima-pwa) -->
<rect x="130" y="105" width="480" height="200" fill="#0A0805"/>
<rect x="130" y="105" width="480" height="200" fill="url(#maAppaBrickRain)" opacity="0.4"/>
<!-- Traditional heavy door -->
<rect x="305" y="120" width="130" height="185" rx="2" fill="#1A0A00" stroke="#050402" stroke-width="2"/>
<path d="M305,195 Q370,145 435,195" fill="none" stroke="#2A1508" stroke-width="4"/>

<!-- RAIN (visual logic for AI) -->
<g stroke="#9BB3CC" stroke-width="0.5" opacity="0.2">
  <line x1="60" y1="105" x2="40" y2="605"/>
  <line x1="160" y1="105" x2="140" y2="605"/>
</g>

<!-- PROPS NOTES -->
<rect x="740" y="700" width="340" height="480" rx="4" fill="#EDE4D0" stroke="#5A6A7A" stroke-width="1.5"/>
<text x="910" y="730" font-family="Georgia, serif" font-size="14" fill="#1A2A3A" text-anchor="middle" font-weight="bold">MALLA EXTERIOR LOGIC</text>
<text x="755" y="765" font-family="Georgia, serif" font-size="11" fill="#3A4A5A">• Walls: Predominantly dark red-oil brick</text>
<text x="755" y="785" font-family="Georgia, serif" font-size="11" fill="#3A4A5A">• Tundals: Carved wooden struts supporting roofs</text>
<text x="755" y="805" font-family="Georgia, serif" font-size="11" fill="#3A4A5A">• Door: Sima-pwa style (heavy, dark, carved)</text>
</svg>
