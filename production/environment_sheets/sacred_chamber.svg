<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1400" viewBox="0 0 1100 1400">
<defs>
  <pattern id="maAppaBrick" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
    <rect width="38" height="18" fill="#8B3520" opacity="0.3"/>
    <path d="M38,0 V20 M0,18 H40" stroke="#5A2A18" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <pattern id="wovenSukul" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M0,10 H20 M10,0 V20" stroke="#7A5A30" stroke-width="0.5" opacity="0.3"/>
    <rect width="20" height="20" fill="#B8860B" opacity="0.05"/>
  </pattern>
  <linearGradient id="bgSC" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F5EDD8"/>
    <stop offset="100%" stop-color="#E8D9BE"/>
  </linearGradient>
  <radialGradient id="lampGlow1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFE680" stop-opacity="0.9"/>
    <stop offset="60%" stop-color="#FFC700" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="lampGlowCool" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#A8D8F0" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#4A6FA5" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="floorWarm" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#C8A060"/>
    <stop offset="100%" stop-color="#8B6030"/>
  </linearGradient>
  <linearGradient id="floorCool" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7A8899"/>
    <stop offset="100%" stop-color="#4A5860"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1100" height="1400" fill="url(#bgSC)"/>
<rect x="0" y="0" width="1100" height="6" fill="#8B4A00"/>
<rect x="0" y="1394" width="1100" height="6" fill="#8B4A00"/>

<!-- Header -->
<rect x="0" y="0" width="1100" height="90" fill="#2A1500"/>
<text x="550" y="38" font-family="Georgia, serif" font-size="26" fill="#FFD060" text-anchor="middle" letter-spacing="5">THE SACRED CHAMBER (MALLA PERIOD)</text>
<text x="550" y="66" font-family="Georgia, serif" font-size="13" fill="#A07840" text-anchor="middle" letter-spacing="3">AUTHENTIC 17th CENTURY NEWAR ARCHITECTURE — ACTS 1 &amp; 2</text>

<!-- ══════════════════════ ACT 1 SCENE (WARM) — LEFT PANEL ══════════════════════ -->
<rect x="20" y="105" width="520" height="520" rx="4" fill="#2A1800"/>
<!-- Warm floor -->
<rect x="20" y="105" width="520" height="520" fill="#3D2200"/>
<!-- Floor perspective -->
<path d="M20,625 L270,420 L540,420 L540,625 Z" fill="#5A3510"/>
<path d="M20,625 L270,420 L540,420 L540,625 Z" fill="url(#floorWarm)" opacity="0.5"/>
<!-- Sukul mat texture -->
<path d="M20,625 L270,420 L540,420 L540,625 Z" fill="url(#wovenSukul)" opacity="0.3"/>

<!-- Floor tiles/planks -->
<path d="M20,530 Q280,510 540,530" stroke="#4A2A08" stroke-width="1" fill="none"/>
<path d="M20,580 Q280,560 540,580" stroke="#4A2A08" stroke-width="1" fill="none"/>

<!-- Back wall warm - Ma-Appa bricks -->
<rect x="20" y="105" width="520" height="315" fill="#3D2800"/>
<rect x="20" y="105" width="520" height="315" fill="url(#maAppaBrick)" opacity="0.6"/>

<!-- Wall carvings - heavy Sal-wood pillars -->
<rect x="30" y="105" width="40" height="315" fill="#2A1500" stroke="#1A0A00" stroke-width="1"/>
<rect x="500" y="105" width="40" height="315" fill="#2A1500" stroke="#1A0A00" stroke-width="1"/>
<!-- Ceiling Beams -->
<rect x="20" y="105" width="520" height="25" fill="#1A0A00" opacity="0.8"/>
<path d="M30,130 Q130,125 230,130 M330,130 Q430,125 530,130" stroke="#3D2200" stroke-width="2" fill="none"/>

<!-- Window / Arch section (Ankhijhyal) -->
<rect x="200" y="115" width="140" height="220" rx="6" fill="#1A1005"/>
<path d="M200,215 Q270,140 340,215 L340,335 L200,335 Z" fill="#2A1808"/>
<!-- Refined Peacock Lattice -->
<g stroke="#8B5A20" stroke-width="1.5" fill="none">
  <path d="M270,212 L270,335"/>
  <path d="M245,215 L245,335"/>
  <path d="M295,215 L295,335"/>
  <!-- Peacock motif hints -->
  <circle cx="270" cy="240" r="10" stroke-width="1"/>
  <path d="M260,240 Q270,220 280,240 T270,260 T260,240" stroke-width="0.8" opacity="0.6"/>
  <line x1="200" y1="265" x2="340" y2="265"/>
  <line x1="200" y1="295" x2="340" y2="295"/>
</g>

<!-- GAME TABLE (Malla-style Chokhat) -->
<rect x="190" y="490" width="160" height="15" rx="2" fill="#2A1500"/> <!-- Very low base -->
<ellipse cx="270" cy="500" rx="85" ry="40" fill="#6B3A10"/>
<ellipse cx="270" cy="495" rx="80" ry="36" fill="#8B5020"/>
<!-- Table surface patterns - Newar floral -->
<ellipse cx="270" cy="494" rx="75" ry="32" fill="none" stroke="#D4AF37" stroke-width="2"/>
<path d="M270,462 Q290,494 270,526 M270,462 Q250,494 270,526" stroke="#D4AF37" stroke-width="0.5" opacity="0.4" fill="none"/>

<!-- ══════════════════════ ACT 2 SCENE (COOL) — RIGHT PANEL ══════════════════════ -->
<rect x="560" y="105" width="520" height="520" rx="4" fill="#1A2030"/>

<!-- Cool floor with Sukul mat -->
<path d="M560,625 L810,420 L1080,420 L1080,625 Z" fill="#2A3A4A"/>
<path d="M560,625 L810,420 L1080,420 L1080,625 Z" fill="url(#floorCool)" opacity="0.4"/>
<path d="M560,625 L810,420 L1080,420 L1080,625 Z" fill="url(#wovenSukul)" opacity="0.15"/>

<!-- Back wall cool - Ma-Appa bricks -->
<rect x="560" y="105" width="520" height="315" fill="#152035"/>
<rect x="560" y="105" width="520" height="315" fill="url(#maAppaBrick)" opacity="0.3"/>

<!-- Same pillars cool -->
<rect x="570" y="105" width="40" height="315" fill="#142030" stroke="#0E1520" stroke-width="1"/>
<rect x="1040" y="105" width="40" height="315" fill="#142030" stroke="#0E1520" stroke-width="1"/>

<!-- Center arch cool -->
<rect x="740" y="115" width="140" height="220" rx="6" fill="#0E1520"/>
<path d="M740,215 Q810,140 880,215 L880,335 L740,335 Z" fill="#0A1018"/>
<g stroke="#2A4A6A" stroke-width="1.5" fill="none">
  <path d="M810,212 L810,335"/>
  <circle cx="810" cy="240" r="10" stroke-width="1" opacity="0.5"/>
</g>

<!-- Game table - cool lit, token fallen -->
<rect x="730" y="490" width="160" height="15" rx="2" fill="#0E1520"/>
<ellipse cx="810" cy="500" rx="85" ry="40" fill="#1A2838"/>
<ellipse cx="810" cy="495" rx="80" ry="36" fill="#243040"/>

<!-- ══════════════════ PROPS REFERENCE ══════════════════ -->
<rect x="710" y="700" width="360" height="380" rx="4" fill="#EDE0C8" stroke="#8B6030" stroke-width="1.5"/>
<text x="890" y="724" font-family="Georgia, serif" font-size="13" fill="#4A2A08" text-anchor="middle" font-weight="bold">MALLA-ERA KEY PROPS</text>
<line x1="725" y1="732" x2="1055" y2="732" stroke="#8B6030" stroke-width="1" opacity="0.5"/>

<!-- Game table prop -->
<text x="725" y="755" font-family="Georgia, serif" font-size="11" fill="#4A2A08" font-weight="bold">LOW CHOKHAT TABLE</text>
<text x="725" y="772" font-family="Georgia, serif" font-size="10" fill="#5A3A1A">• Traditional very low floor board</text>
<text x="725" y="788" font-family="Georgia, serif" font-size="10" fill="#5A3A1A">• Carved from dark Sal-wood</text>
<text x="725" y="804" font-family="Georgia, serif" font-size="10" fill="#5A3A1A">• Sitting on royal velvet Gaddi</text>

<!-- Brick note -->
<text x="725" y="845" font-family="Georgia, serif" font-size="11" fill="#4A2A08" font-weight="bold">MA-APPA BRICKWORK</text>
<text x="725" y="862" font-family="Georgia, serif" font-size="10" fill="#5A3A1A">• Traditional oil-finished red brick</text>
<text x="725" y="878" font-family="Georgia, serif" font-size="10" fill="#5A3A1A">• Thin invisible joints</text>

<!-- Lattice note -->
<text x="725" y="915" font-family="Georgia, serif" font-size="11" fill="#4A2A08" font-weight="bold">ANKHIJHYAL WINDOWS</text>
<text x="725" y="932" font-family="Georgia, serif" font-size="10" fill="#5A3A1A">• Peacock and floral wood carvings</text>
<text x="725" y="948" font-family="Georgia, serif" font-size="10" fill="#5A3A1A">• Blind window style (narrow openings)</text>

</svg>
