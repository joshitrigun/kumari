<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1100" viewBox="0 0 1100 1100">
<defs>
  <linearGradient id="dawnSky" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7090C0"/>
    <stop offset="40%" stop-color="#E8A070"/>
    <stop offset="70%" stop-color="#F5C890"/>
    <stop offset="100%" stop-color="#F5E6D3"/>
  </linearGradient>
  <radialGradient id="sunGlow" cx="70%" cy="25%" r="40%">
    <stop offset="0%" stop-color="#FFE0A0" stop-opacity="0.95"/>
    <stop offset="50%" stop-color="#F5C070" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#F5A040" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="childAura" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFAE0" stop-opacity="0.9"/>
    <stop offset="60%" stop-color="#FFE890" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FFD060" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="bgPage2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F8F2E4"/>
    <stop offset="100%" stop-color="#EDE4D0"/>
  </linearGradient>
  <linearGradient id="stoneFloor" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#C8B898"/>
    <stop offset="100%" stop-color="#A89878"/>
  </linearGradient>
</defs>

<!-- Page background -->
<rect width="1100" height="1100" fill="url(#bgPage2)"/>
<rect x="0" y="0" width="1100" height="6" fill="#C87820"/>
<rect x="0" y="1094" width="1100" height="6" fill="#C87820"/>

<!-- Header -->
<rect x="0" y="0" width="1100" height="90" fill="#1E1200"/>
<text x="550" y="38" font-family="Georgia, serif" font-size="26" fill="#FFD4A3" text-anchor="middle" letter-spacing="5">DAWN COURTYARD (ACT 4)</text>
<text x="550" y="66" font-family="Georgia, serif" font-size="13" fill="#A08040" text-anchor="middle" letter-spacing="3">MALLA-ERA DURBAR SQUARE STYLE — THE REBIRTH</text>

<!-- ══════════════════════ MAIN SCENE VIEW ══════════════════════ -->
<rect x="20" y="105" width="700" height="490" rx="4" fill="#0A0502"/>

<!-- SKY -->
<rect x="20" y="105" width="700" height="200" fill="url(#dawnSky)"/>

<!-- MALLA TIERED ROOFS (Background Architecture) -->
<g transform="translate(400,120) scale(0.6)">
  <!-- Bottom tier -->
  <path d="M0,100 L200,100 L180,50 L20,50 Z" fill="#3D2210"/>
  <!-- Top tier -->
  <path d="M40,50 L160,50 L130,0 L70,0 Z" fill="#2A1508"/>
  <!-- Gajur (Copper Pinnacle) -->
  <circle cx="100" cy="-10" r="12" fill="#D4AF37"/>
  <path d="M100,-25 L92,-10 L108,-10 Z" fill="#FFD060"/>
</g>

<!-- ARCHWAY (large, framing) with Tundals -->
<rect x="250" y="175" width="220" height="200" rx="4" fill="#A89060"/>
<path d="M250,268 Q360,185 470,268 L470,375 L250,375 Z" fill="#8B7040"/>
<!-- Tundals (roof struts) supporting the arch top -->
<path d="M250,268 L220,230 L250,240 Z" fill="#2A1508"/>
<path d="M470,268 L500,230 L470,240 Z" fill="#2A1508"/>

<!-- CENTRAL STONE CHAITYA (Hint) -->
<g transform="translate(80,320) scale(0.4)">
  <rect x="0" y="100" width="80" height="40" fill="#7B8FA3"/>
  <circle cx="40" cy="80" r="35" fill="#E8EAEC"/>
  <rect x="25" y="30" width="30" height="20" fill="#7B8FA3"/>
</g>

<!-- PROPS NOTES -->
<rect x="740" y="700" width="340" height="380" rx="4" fill="#F0E8D8" stroke="#C87820" stroke-width="1.5"/>
<text x="910" y="730" font-family="Georgia, serif" font-size="14" fill="#2A1200" text-anchor="middle" font-weight="bold">MALLA CHOWK LOGIC</text>
<text x="755" y="765" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Tiered Roofs: iconic 2-3 level wooden roofs</text>
<text x="755" y="785" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Gajur: gold/copper pinnacles reaching the sky</text>
<text x="755" y="805" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Chaitya: small stone Buddhist shrines in corners</text>
<text x="755" y="825" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Tundals: carved struts supporting every roof level</text>
</svg>
