<!-- ═══════════════════════════════ SCENE NOTE ═══════════════════════════════ -->
<rect x="510" y="590" width="370" height="240" rx="6" fill="#E8D8C8" stroke="#8B6A3A" stroke-width="1.5"/>
<text x="695" y="614" font-family="Georgia, serif" font-size="12" fill="#4A2A0A" text-anchor="middle" font-weight="bold">SCENE CONTEXT</text>
<text x="695" y="634" font-family="Georgia, serif" font-size="10" fill="#4A2A0A" text-anchor="middle">Shot 1–4 (0:00–0:50)</text>
<line x1="530" y1="642" x2="860" y2="642" stroke="#8B6A3A" stroke-width="1" opacity="0.5"/>
<text x="525" y="662" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Always seen THROUGH lattice screen</text>
<text x="525" y="680" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Upper body only — no full-body shots</text>
<text x="525" y="698" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Peeking in: jealous of King's devotion</text>
<text x="525" y="716" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Not the villain — a witness, not a cause</text>
<text x="525" y="734" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Her emotions trigger awareness in King</text>
<text x="525" y="752" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Exit before Act 2 — never seen again</text>
<text x="695" y="780" font-family="Georgia, serif" font-size="10" fill="#8B5A30" text-anchor="middle" font-style="italic">Brief but critical: she humanises the story.</text>
<text x="695" y="796" font-family="Georgia, serif" font-size="10" fill="#8B5A30" text-anchor="middle" font-style="italic">Keep her sympathetic, not accusatory.</text>
<text x="695" y="814" font-family="Georgia, serif" font-size="10" fill="#8B5A30" text-anchor="middle" font-style="italic">Camera angle should feel voyeuristic but</text>
<text x="695" y="832" font-family="Georgia, serif" font-size="10" fill="#8B5A30" text-anchor="middle" font-style="italic">never revealing — the lattice is her mask.</text>

<!-- DESIGN NOTES -->
<rect x="510" y="852" width="370" height="185" rx="6" fill="#E8D8C8" stroke="#8B6A3A" stroke-width="1.5"/>
<text x="525" y="875" font-family="Georgia, serif" font-size="13" fill="#2A1200" font-weight="bold" letter-spacing="1">DESIGN NOTES</text>
<text x="525" y="896" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Royal sari: deep magenta/plum with gold border</text>
<text x="525" y="914" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Elaborate hair bun with gold ornaments</text>
<text x="525" y="932" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Ornate jewelry — she is royalty too</text>
<text x="525" y="950" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Hands grip lattice — physical tension, longing</text>
<text x="525" y="968" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">• Lattice bars always partially obscure face</text>
<text x="525" y="986" font-family="Georgia, serif" font-size="11" fill="#5A3A1A">  (min. 2-3 bars across her at all times)</text>
<text x="525" y="1020" font-family="Georgia, serif" font-size="11" fill="#8B1A1A" font-style="italic">Arc: Watching → Aching → Shock → Exit</text>

