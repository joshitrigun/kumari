<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Dawn Sky Atmosphere (Act 4) -->
  <linearGradient id="dawnSkyShot" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7090C0"/>
    <stop offset="40%" stop-color="#E8A070"/>
    <stop offset="100%" stop-color="#F5E6D3"/>
  </linearGradient>
  <rect width="100%" height="600" fill="url(#dawnSkyShot)"/>
  
  <!-- Ground (Stone Courtyard - Warm Dawn) -->
  <rect x="0" y="600" width="1920" height="480" fill="#C8B898"/>
  <path d="M0,1080 L700,600 L1220,600 L1920,1080 Z" fill="#A89878" opacity="0.4"/>

  <!-- Background Architecture (Malla Roofs - Simplified) -->
  <g transform="translate(1400, 100) scale(1.5)">
    <path d="M0,100 L200,100 L180,50 L20,50 Z" fill="#3D2210"/> <!-- Bottom tier -->
    <path d="M40,50 L160,50 L130,0 L70,0 Z" fill="#2A1508"/> <!-- Top tier -->
    <circle cx="100" cy="-10" r="10" fill="#D4AF37"/> <!-- Gajur -->
  </g>

  <!-- Stone Chaitya (Background Left) -->
  <g transform="translate(300, 500) scale(1.5)">
    <rect x="-40" y="100" width="80" height="40" fill="#7B8FA3" opacity="0.8"/>
    <circle cx="0" cy="80" r="35" fill="#E8EAEC" opacity="0.8"/>
    <rect x="-15" y="30" width="30" height="20" fill="#7B8FA3" opacity="0.8"/>
  </g>

  <!-- THE KUMARI CHILD (Center Focus - Walking Forward) -->
  <g transform="translate(960, 550) scale(0.9)">
    <!-- Child Aura -->
    <circle cx="0" cy="150" r="400" fill="#FFE890" opacity="0.1"/>
    
    <!-- Body/Dress (Crimson) -->
    <path d="M-120,450 Q-100,200 0,100 Q100,200 120,450 Z" fill="#C01020"/>
    <path d="M-120,430 Q0,445 120,430" stroke="#D4AF37" stroke-width="8" fill="none"/> <!-- Hem -->

    <!-- Head (Elaborate updo) -->
    <circle cx="0" cy="50" r="85" fill="#C89870"/>
    <path d="M-70,0 Q0,-80 70,0" fill="#0D0500"/> <!-- Hair -->
    <path d="M-40,-50 L0,-100 L40,-50 Z" fill="#C01020"/> <!-- Crown detail -->

    <!-- THE GLOWING TOKEN (Held at chest level) -->
    <g transform="translate(0, 250)">
      <circle cx="0" cy="0" r="60" fill="#FFE060" opacity="0.3"/> <!-- Outer glow -->
      <circle cx="0" cy="0" r="25" fill="#FFF0D0"/> <!-- Inner token -->
      <!-- Hands (Cupped) -->
      <path d="M-50,0 Q-30,30 -10,10" stroke="#C89870" stroke-width="15" fill="none" stroke-linecap="round"/>
      <path d="M50,0 Q30,30 10,10" stroke="#C89870" stroke-width="15" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Soft Dawn Radiance Overlay -->
  <rect width="100%" height="100%" fill="#F5E6D3" opacity="0.1"/>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD4A3" text-anchor="middle" letter-spacing="4">SHOT 15: THE KUMARI APPEARS — 4:11–4:40 — DAWN HOPE</text>
</svg>