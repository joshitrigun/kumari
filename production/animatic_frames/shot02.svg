  <ellipse cx="960" cy="930" rx="520" ry="160" fill="#3D2210"/>
  
  <!-- Table Surface Pattern (Dolly-in detail) -->
  <ellipse cx="960" cy="930" rx="450" ry="130" fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.4"/>

  <!-- Gaddi Cushions (Moved with characters) -->
