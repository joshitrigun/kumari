  <ellipse cx="1370" cy="1000" rx="250" ry="80" fill="#6B1010" opacity="0.6"/>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD060" text-anchor="middle" letter-spacing="4">SHOT 2: DOLLY TO TABLE — 0:05–0:15 — DEPTH ESTABLISH</text>
