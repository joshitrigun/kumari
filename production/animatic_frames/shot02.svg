  <!-- PERSPECTIVE LAYOUT (Dolly-in state) -->

  <!-- Back Wall (Deeper, shifted down) -->
  <rect x="-100" y="0" width="2120" height="600" fill="#2A1508"/>

  <!-- Floor (Perspective expanded) -->
  <path d="M-200,1200 L700,600 L1220,600 L2120,1200 Z" fill="#4A2A08"/>

  <!-- Malla Sal-Wood Pillars (Moved outward) -->
  <rect x="50" y="0" width="150" height="650" fill="#1A0A00"/>
  <rect x="1720" y="0" width="150" height="650" fill="#1A0A00"/>

  <!-- Ankhijhyal (Lattice Window) Background (Larger) -->
  <rect x="760" y="50" width="400" height="500" rx="10" fill="#0A0502"/>
  <path d="M760,250 Q960,-100 1160,250 L1160,550 L760,550 Z" fill="#1A1005" opacity="0.8"/>

  <!-- King's Silhouette (Back/Side view - Left) -->
