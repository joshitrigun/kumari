  <circle cx="580" cy="580" r="60" fill="#1A0A00" opacity="0.8"/> <!-- Head -->

  <!-- Taleju's Silhouette (Front/Side view - Right) -->
  <path d="M1520,1080 Q1570,800 1470,650 Q1420,550 1320,600 Q1270,700 1270,850 L1170,1080 Z" fill="#2D1B00" opacity="0.7"/>
  <circle cx="1340" cy="580" r="55" fill="#2D1B00" opacity="0.7"/> <!-- Head -->
  <ellipse cx="1340" cy="580" rx="70" ry="80" fill="#FFE87A" opacity="0.1"/> <!-- Divine aura hint -->

  <!-- Central Low Table (Chokhat) Silhouette (Much larger, closer) -->
