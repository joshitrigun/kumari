<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Cold Empty Atmosphere -->
  <rect width="100%" height="100%" fill="#0A1018"/>
  
  <!-- Back Wall (Very dark) -->
  <rect x="0" y="0" width="1920" height="600" fill="#05080A"/>

  <!-- TALEJU (Vanishing - Center) -->
  <g transform="translate(1100, 500) scale(1.0)">
    <!-- Dissolving Body (Noise/Opacity) -->
    <path d="M-200,500 Q-150,200 -100,0 Q0,-50 100,0 Q150,200 200,500 Z" fill="#FFE87A" opacity="0.3"/>
    <!-- Dissolve Particles (Rising UPWARD) -->
    <circle cx="-50" cy="-50" r="5" fill="#FFE87A" opacity="0.6"/>
    <circle cx="50" cy="-100" r="3" fill="#FFE87A" opacity="0.4"/>
    <circle cx="0" cy="-150" r="4" fill="#FFE87A" opacity="0.5"/>
    <circle cx="-80" cy="-200" r="2" fill="#FFE87A" opacity="0.3"/>
    <circle cx="80" cy="-250" r="5" fill="#FFE87A" opacity="0.4"/>
    
    <!-- Head/Face (Fading Compassion) -->
    <ellipse cx="0" cy="-100" rx="100" ry="120" fill="#D4B888" opacity="0.5"/>
    <ellipse cx="0" cy="-100" rx="100" ry="120" fill="#FFE87A" opacity="0.2"/>
  </g>

  <!-- THE LOTUS TOKEN (Falling/Rolling) -->
  <g transform="translate(1000, 750) rotate(45)">
    <!-- Shadow -->
    <ellipse cx="0" cy="50" rx="40" ry="10" fill="#000" opacity="0.4"/>
    <!-- Token -->
    <path d="M-30,0 Q0,-40 30,0 Q40,20 0,25 Q-40,20 -30,0 Z" fill="#D4AF37"/>
    <!-- Motion lines -->
    <path d="M0,-30 Q0,-60 0,-80" stroke="#FFE87A" stroke-width="2" fill="none" opacity="0.3"/>
  </g>

  <!-- KING (Foreground Silhouette - Left) -->
  <g transform="translate(400, 1080) scale(1.5)">
    <path d="M-200,0 Q-150,-400 -50,-600 Q0,-650 100,-600 Q200,-400 250,0 Z" fill="#05080A"/>
    <!-- Crown silhouette -->
    <path d="M-50,-600 L-30,-650 L50,-680 L130,-650 L150,-600 Z" fill="#05080A"/>
  </g>

  <!-- Table Silhouette (Close to floor) -->
  <ellipse cx="1000" cy="850" rx="400" ry="100" fill="#0E1520" opacity="0.8"/>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#A8D8F0" text-anchor="middle" letter-spacing="4">SHOT 8: THE VANISHING — 1:53–2:19 — SHE FADES</text>
</svg>