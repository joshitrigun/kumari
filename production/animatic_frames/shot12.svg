<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Rainy Night Atmosphere (Act 3 Courtyard) -->
  <rect width="100%" height="100%" fill="#1A2030"/>

  <!-- Courtyard Architecture (Stone/Gloom) -->
  <!-- Floor (Stone) -->
  <path d="M0,1080 L700,600 L1220,600 L1920,1080 Z" fill="#2A3A4A" opacity="0.6"/>
  
  <!-- Stone Chaitya (Silhouette - Left) -->
  <g transform="translate(300, 500) scale(1.5)">
    <rect x="-40" y="100" width="80" height="40" fill="#0E1520"/>
    <circle cx="0" cy="80" r="35" fill="#0E1520"/>
    <rect x="-15" y="30" width="30" height="20" fill="#0E1520"/>
  </g>

  <!-- KING (Meditating - Center) -->
  <g transform="translate(960, 750) scale(1.1)">
    <!-- Body (Penitent posture) -->
    <path d="M-180,200 Q0,-80 180,200 L250,300 L-250,300 Z" fill="#3A4A55"/>
    <!-- Head (Anguish expression - Close enough to see detail) -->
    <ellipse cx="0" cy="-60" rx="70" ry="85" fill="#6B4528"/>
    <path d="M-70,-100 Q-30,-160 0,-150 Q30,-160 70,-100" fill="#1A0A00"/> <!-- Messy hair -->
    
    <!-- Face Detail (Anguish) -->
    <path d="M-40,-80 Q-20,-90 0,-85" stroke="#1A0A00" stroke-width="4" fill="none"/> <!-- Sad brow -->
    <path d="M40,-80 Q20,-90 0,-85" stroke="#1A0A00" stroke-width="4" fill="none"/>
    <path d="M-20,0 Q0,10 20,0" stroke="#3A1A08" stroke-width="3" fill="none"/> <!-- Pained mouth -->
  </g>

  <!-- SINGLE WARM LANTERN (Accent) -->
  <g transform="translate(1200, 650)">
    <circle cx="0" cy="0" r="100" fill="#FFB347" opacity="0.15"/>
    <circle cx="0" cy="0" r="40" fill="#FFB347" opacity="0.4"/>
    <rect x="-15" y="-25" width="30" height="50" rx="5" fill="#FF8C00"/>
    <path d="M0,-25 L0,-40" stroke="#2A1508" stroke-width="4"/>
  </g>

  <!-- RAIN OVERLAY -->
  <g stroke="#9BB3CC" stroke-width="1" opacity="0.15">
    <line x1="200" y1="0" x2="180" y2="1080"/>
    <line x1="700" y1="0" x2="680" y2="1080"/>
    <line x1="1200" y1="0" x2="1180" y2="1080"/>
    <line x1="1700" y1="0" x2="1680" y2="1080"/>
  </g>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#9BB3CC" text-anchor="middle" letter-spacing="4">SHOT 12: COURTYARD PENANCE — 3:15–3:29 — MEDITATION & FASTING</text>
</svg>