<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Dawn Atmosphere -->
  <linearGradient id="dawnSky16" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#7090C0"/>
    <stop offset="40%" stop-color="#E8A070"/>
    <stop offset="100%" stop-color="#F5E6D3"/>
  </linearGradient>
  <rect width="100%" height="600" fill="url(#dawnSky16)"/>
  <rect x="0" y="600" width="1920" height="480" fill="#C8B898"/>

  <!-- KING (Mid-ground Right - Watching) -->
  <g transform="translate(1400, 600) scale(1.0)">
    <!-- Body (Peaceful posture) -->
    <path d="M-150,480 Q-100,200 0,100 Q100,200 150,480 Z" fill="#8B1A1A"/>
    <!-- Head (Acceptance expression) -->
    <ellipse cx="0" cy="50" rx="75" ry="95" fill="#8B6340"/>
    <!-- Simple Crown -->
    <path d="M-50,0 L0,-40 L50,0 Z" fill="#D4AF37" opacity="0.8"/>
  </g>

  <!-- PEOPLE BOWING (Foreground Silhouettes) -->
  <g transform="translate(400, 1080)">
    <!-- Person 1 -->
    <path d="M-200,0 Q-150,-200 -50,-250 Q0,-260 50,-250 Q150,-200 200,0 Z" fill="#2A1200" opacity="0.9"/>
    <circle cx="0" cy="-280" r="40" fill="#2A1200" opacity="0.9"/>
  </g>
  <g transform="translate(800, 1080)">
    <!-- Person 2 -->
    <path d="M-180,0 Q-130,-180 -40,-230 Q0,-240 40,-230 Q130,-180 180,0 Z" fill="#2A1200" opacity="0.8"/>
    <circle cx="0" cy="-260" r="35" fill="#2A1200" opacity="0.8"/>
  </g>
  <g transform="translate(1100, 1080)">
    <!-- Person 3 -->
    <path d="M-150,0 Q-100,-150 -30,-200 Q0,-210 30,-200 Q100,-150 150,0 Z" fill="#2A1200" opacity="0.7"/>
    <circle cx="0" cy="-230" r="30" fill="#2A1200" opacity="0.7"/>
  </g>

  <!-- Background Architecture (Faint) -->
  <g transform="translate(200, 200) scale(1.0)">
    <path d="M0,100 L200,100 L180,50 L20,50 Z" fill="#3D2210" opacity="0.2"/>
  </g>

  <!-- Soft Dawn Radiance -->
  <rect width="100%" height="100%" fill="#F5E6D3" opacity="0.05"/>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD4A3" text-anchor="middle" letter-spacing="4">SHOT 16: PEOPLE BOW — 4:40–4:55 — REVERENCE RESTORED</text>
</svg>