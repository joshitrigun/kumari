<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Cold Harsh Atmosphere -->
  <rect width="100%" height="100%" fill="#1A2030"/>
  
  <!-- Harsh Side Light Glow -->
  <rect x="0" y="0" width="500" height="1080" fill="#A8D8F0" opacity="0.1"/>

  <!-- KING'S FACE (Extreme Close-up - Desire Flash) -->
  <g transform="translate(960, 540) scale(3.5)">
    <!-- Face Shadowed Side -->
    <ellipse cx="0" cy="0" rx="140" ry="160" fill="#5A3520"/>
    <!-- Cold Highlight Side -->
    <path d="M0,-160 Q140,-160 140,0 Q140,160 0,160 Z" fill="#8B6340"/>
    <path d="M0,-160 Q120,-160 120,0 Q120,160 0,160 Z" fill="#A8D8F0" opacity="0.15"/>

    <!-- Crown (Cooler gold) -->
    <path d="M-100,-130 L-80,-200 L0,-240 L80,-200 L100,-130 Z" fill="#B8A060"/>
    <!-- Loose Hair Strand (Critial detail from reference) -->
    <path d="M-60,-130 Q-90,-100 -70,-50" stroke="#1A0A00" stroke-width="3" fill="none"/>

    <!-- Eyes (Narrowed, Intense) -->
    <ellipse cx="50" cy="-20" rx="35" ry="15" fill="white"/>
    <ellipse cx="60" cy="-20" rx="18" ry="12" fill="#3D2B1F"/>
    <circle cx="65" cy="-22" r="8" fill="#0D0500"/>
    <!-- Metallic Glint -->
    <circle cx="70" cy="-25" r="4" fill="white" opacity="0.9"/>
    
    <ellipse cx="-50" cy="-20" rx="35" ry="15" fill="white"/>
    <ellipse cx="-40" cy="-20" rx="18" ry="12" fill="#3D2B1F"/>
    <circle cx="-35" cy="-22" r="8" fill="#0D0500"/>

    <!-- Furrowed Brows -->
    <path d="M20,-45 Q50,-55 80,-45" stroke="#1A0A00" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M-80,-45 Q-50,-55 -20,-45" stroke="#1A0A00" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M-15,-35 L15,-35" stroke="#1A0A00" stroke-width="5" fill="none"/>

    <!-- Tight Mouth -->
    <path d="M-40,90 Q0,95 40,90" stroke="#1A0A00" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#A8D8F0" text-anchor="middle" letter-spacing="4">SHOT 6: THE TRANSGRESSION — 1:13–1:40 — LIGHTING SHIFT</text>
</svg>