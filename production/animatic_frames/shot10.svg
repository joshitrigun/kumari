<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Cold Rainy Night Atmosphere -->
  <rect width="100%" height="100%" fill="#1A2030"/>

  <!-- ALLEY PERSPECTIVE -->
  
  <!-- Left Wall (Stone/Brick) -->
  <path d="M0,0 L800,400 L800,600 L0,1080 Z" fill="#0E1520"/>
  <path d="M0,0 L800,400 L800,600 L0,1080 Z" fill="none" stroke="#2A3A50" stroke-width="2" opacity="0.3"/>
  
  <!-- Right Wall (Stone/Brick) -->
  <path d="M1920,0 L1120,400 L1120,600 L1920,1080 Z" fill="#0E1520"/>
  <path d="M1920,0 L1120,400 L1120,600 L1920,1080 Z" fill="none" stroke="#2A3A50" stroke-width="2" opacity="0.3"/>

  <!-- Back Wall/End of Alley -->
  <rect x="800" y="400" width="320" height="200" fill="#05080A"/>
  
  <!-- Single Warm Lamp Accent (Depth cue) -->
  <g transform="translate(1100, 450)">
    <circle cx="0" cy="0" r="50" fill="#FFB347" opacity="0.2"/>
    <circle cx="0" cy="0" r="10" fill="#FFB347"/>
  </g>

  <!-- KING (Walking Away/Side Profile - Penitent) -->
  <g transform="translate(960, 800) scale(0.8)">
    <!-- Body (Head down, hunched shoulders) -->
    <path d="M-100,300 Q-80,0 0,-50 Q80,0 100,300 Z" fill="#3A4A55"/>
    <!-- Head (No crown, hair messy) -->
    <ellipse cx="0" cy="-80" rx="60" ry="70" fill="#6B4528"/>
    <path d="M-60,-100 Q-30,-150 0,-140 Q30,-150 60,-100" fill="#1A0A00"/> <!-- Messy hair -->
    <!-- Walking posture -->
    <path d="M-50,300 L-70,500" stroke="#3A4A55" stroke-width="60" stroke-linecap="round"/>
    <path d="M50,300 L30,480" stroke="#2A3A45" stroke-width="60" stroke-linecap="round"/>
  </g>

  <!-- RAIN OVERLAY -->
  <g stroke="#9BB3CC" stroke-width="1" opacity="0.2">
    <line x1="100" y1="0" x2="80" y2="1080"/>
    <line x1="500" y1="0" x2="480" y2="1080"/>
    <line x1="900" y1="0" x2="880" y2="1080"/>
    <line x1="1300" y1="0" x2="1280" y2="1080"/>
    <line x1="1700" y1="0" x2="1680" y2="1080"/>
  </g>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#9BB3CC" text-anchor="middle" letter-spacing="4">SHOT 10: RAIN ALLEY — 2:40–3:00 — TRANSITION TO PENANCE</text>
</svg>