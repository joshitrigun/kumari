<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Soft Dawn Morning Atmosphere (Epilogue) -->
  <rect width="100%" height="100%" fill="#F5E6D3"/>
  
  <!-- Courtyard Stone Floor (Airy/Clean) -->
  <path d="M0,1080 L700,600 L1220,600 L1920,1080 Z" fill="#C8B898" opacity="0.3"/>

  <!-- THE GAME BOARD (Chokhat - Close-up Focus) -->
  <g transform="translate(960, 600) scale(1.5)">
    <!-- Shadow -->
    <ellipse cx="0" cy="110" rx="350" ry="100" fill="#2A1200" opacity="0.1"/>
    <!-- Board Base -->
    <ellipse cx="0" cy="100" rx="320" ry="90" fill="#1A0A00"/>
    <!-- Board Surface -->
    <ellipse cx="0" cy="90" rx="300" ry="80" fill="#3D2210"/>
    <!-- Gold Pattern (Faint but warm) -->
    <ellipse cx="0" cy="90" rx="250" ry="60" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
    
    <!-- THE LOTUS TOKEN (Resting in peace) -->
    <g transform="translate(0, 50)">
      <!-- Soft Shadow -->
      <ellipse cx="0" cy="30" rx="50" ry="12" fill="#000" opacity="0.2"/>
      <!-- Token -->
      <path d="M-40,0 Q0,-50 40,0 Q50,25 0,30 Q-50,25 -40,0 Z" fill="#D4AF37"/>
      <!-- Petal Details -->
      <path d="M0,-40 Q15,-15 30,-25" stroke="#8B6030" stroke-width="2" fill="none" opacity="0.6"/>
      <path d="M0,-40 Q-15,-15 -30,-25" stroke="#8B6030" stroke-width="2" fill="none" opacity="0.6"/>
      <!-- Soft Morning Glint -->
      <circle cx="10" cy="-20" r="5" fill="white" opacity="0.4"/>
    </g>
  </g>

  <!-- Final Fade out hint (Subtle white vignette) -->
  <rect width="100%" height="100%" fill="none" stroke="white" stroke-width="200" opacity="0.1"/>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD4A3" text-anchor="middle" letter-spacing="4">SHOT 17: EPILOGUE — 4:55–5:00 — PROFOUND RESOLUTION</text>
</svg>