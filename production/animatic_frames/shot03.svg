<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Table Surface Close-up -->
  <rect width="100%" height="100%" fill="#3D2210"/>
  
  <!-- Subtle Table Texture/Pattern -->
  <ellipse cx="960" cy="1200" rx="1200" ry="800" fill="none" stroke="#D4AF37" stroke-width="5" opacity="0.2"/>
  <ellipse cx="960" cy="1200" rx="1000" ry="700" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.1"/>

  <!-- THE LOTUS TOKEN (Central Focus) -->
  <g transform="translate(960, 540) scale(1.5)">
    <!-- Shadow -->
    <ellipse cx="0" cy="30" rx="60" ry="15" fill="#1A0A00" opacity="0.5"/>
    <!-- Lotus Base -->
    <path d="M-50,0 Q0,-60 50,0 Q60,30 0,35 Q-60,30 -50,0 Z" fill="#D4AF37"/>
    <!-- Petals -->
    <path d="M0,-50 Q20,-20 40,-30 T50,0" fill="none" stroke="#8B6030" stroke-width="2"/>
    <path d="M0,-50 Q-20,-20 -40,-30 T-50,0" fill="none" stroke="#8B6030" stroke-width="2"/>
    <path d="M0,-50 Q0,-10 0,30" stroke="#8B6030" stroke-width="2"/>
    <!-- Inner Glow -->
    <circle cx="0" cy="-10" r="15" fill="#FFE87A" opacity="0.3"/>
  </g>

  <!-- KING'S HAND (Entering from Left) -->
  <g transform="translate(300, 600) rotate(10)">
    <!-- Arm/Wrist -->
    <path d="M-400,0 L0,0" stroke="#8B1A1A" stroke-width="120" stroke-linecap="round"/> <!-- Sleeve -->
    <path d="M0,0 Q50,0 80,-20" stroke="#8B6340" stroke-width="90" fill="none" stroke-linecap="round"/> <!-- Wrist -->
    <!-- Fingers reaching for pieces -->
    <path d="M80,-20 Q150,-50 200,-30" stroke="#8B6340" stroke-width="25" fill="none" stroke-linecap="round"/>
    <path d="M85,-10 Q160,-20 210,10" stroke="#8B6340" stroke-width="25" fill="none" stroke-linecap="round"/>
    <path d="M80,10 Q150,30 190,60" stroke="#8B6340" stroke-width="25" fill="none" stroke-linecap="round"/>
  </g>

  <!-- TALEJU'S HAND (Entering from Right) -->
  <g transform="translate(1620, 600) rotate(-10)">
    <!-- Arm/Wrist -->
    <path d="M400,0 L0,0" stroke="#F0E8A8" stroke-width="100" stroke-linecap="round" opacity="0.8"/> <!-- Sleeve -->
    <!-- Divine Aura around hand -->
    <path d="M0,0 Q-100,-20 -250,0" stroke="#FFE87A" stroke-width="60" fill="none" stroke-linecap="round" opacity="0.2"/>
    <!-- Wrist -->
    <path d="M0,0 Q-50,0 -80,-20" stroke="#D4B888" stroke-width="70" fill="none" stroke-linecap="round"/>
    <!-- Fingers - Graceful, hover-like -->
    <path d="M-80,-20 Q-150,-60 -220,-40" stroke="#D4B888" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M-85,-10 Q-160,-30 -230,0" stroke="#D4B888" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M-80,10 Q-150,40 -210,70" stroke="#D4B888" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Light trails -->
    <path d="M-220,-40 Q-260,-60 -300,-50" stroke="#FFE87A" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD060" text-anchor="middle" letter-spacing="4">SHOT 3: HANDS AND TOKEN — 0:15–0:30 — CLOSE ACTION</text>
</svg>