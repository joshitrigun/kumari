<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Warm Candlelit Atmosphere (Queen's side) -->
  <rect width="100%" height="100%" fill="#2A1508"/>
  
  <!-- Subtle Wall Texture -->
  <rect x="0" y="0" width="1920" height="1080" fill="#3D2210" opacity="0.2"/>

  <!-- THE QUEEN (Behind Lattice - Mid-ground) -->
  <g transform="translate(960, 500) scale(1.5)">
    <!-- Face (Awe expression) -->
    <ellipse cx="0" cy="0" rx="140" ry="160" fill="#9A6845"/>
    
    <!-- Eyes (Wide with awe/longing) -->
    <ellipse cx="-50" cy="-20" rx="35" ry="25" fill="white"/>
    <circle cx="-45" cy="-20" r="18" fill="#3D2B1F"/>
    <circle cx="-42" cy="-18" r="10" fill="#0D0500"/>
    <circle cx="-38" cy="-15" r="4" fill="white" opacity="0.6"/> <!-- Tear-line highlight -->

    <ellipse cx="50" cy="-20" rx="35" ry="25" fill="white"/>
    <circle cx="55" cy="-20" r="18" fill="#3D2B1F"/>
    <circle cx="58" cy="-18" r="10" fill="#0D0500"/>

    <!-- Jewelry Glints (Gold) -->
    <circle cx="-130" cy="20" r="15" fill="#D4AF37"/> <!-- Earring -->
    <circle cx="0" cy="30" r="8" fill="#D4AF37"/> <!-- Nose ring hint -->
    
    <!-- Hair (Ornate) -->
    <path d="M-100,-130 Q-150,-180 0,-180 Q150,-180 100,-130" fill="#0D0500"/>
  </g>

  <!-- THE ANKHIJHYAL (Lattice Window - Foreground framing) -->
  <g stroke="#1A0A00" stroke-width="15" fill="none" opacity="0.95">
    <!-- Main Frame -->
    <rect x="400" y="50" width="1120" height="980" rx="20" stroke-width="30"/>
    
    <!-- Lattice Bars (Geometric pattern) -->
    <!-- Horizontal -->
    <line x1="400" y1="200" x2="1520" y2="200"/>
    <line x1="400" y1="400" x2="1520" y2="400"/>
    <line x1="400" y1="600" x2="1520" y2="600"/>
    <line x1="400" y1="800" x2="1520" y2="800"/>
    
    <!-- Vertical -->
    <line x1="600" y1="50" x2="600" y2="1030"/>
    <line x1="850" y1="50" x2="850" y2="1030"/>
    <line x1="1070" y1="50" x2="1070" y2="1030"/>
    <line x1="1320" y1="50" x2="1320" y2="1030"/>
    
    <!-- Diagonal cross-hatching (Decorative) -->
    <line x1="400" y1="50" x2="1520" y2="1030" stroke-width="5" opacity="0.5"/>
    <line x1="1520" y1="50" x2="400" y2="1030" stroke-width="5" opacity="0.5"/>
  </g>

  <!-- Candlelight Highlight on Lattice Edges -->
  <g stroke="#8B5A20" stroke-width="3" fill="none" opacity="0.4">
    <rect x="415" y="65" width="1090" height="950" rx="15"/>
  </g>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD060" text-anchor="middle" letter-spacing="4">SHOT 4: THE QUEEN'S WITNESS — 0:30–0:50 — HISTORICAL ACTING</text>
</svg>