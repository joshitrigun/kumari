<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Warm Nostalgic Atmosphere -->
  <rect width="100%" height="100%" fill="#3D2205"/>
  
  <!-- Soft Golden Glow Background -->
  <circle cx="960" cy="540" r="800" fill="#FFE87A" opacity="0.15"/>
  <circle cx="960" cy="540" r="600" fill="#FFE87A" opacity="0.1"/>

  <!-- TALEJU'S FACE (Close-up Flashback) -->
  <g transform="translate(960, 540) scale(3.5)">
    <!-- Face Base (Radiant) -->
    <ellipse cx="0" cy="0" rx="140" ry="160" fill="#D4B888"/>
    <ellipse cx="0" cy="0" rx="140" ry="160" fill="#FFE87A" opacity="0.1"/>
    
    <!-- Crown -->
    <path d="M-100,-130 L-80,-200 L0,-240 L80,-200 L100,-130 Z" fill="#D4AF37"/>
    
    <!-- Eyes (Compassion - Soft focus) -->
    <ellipse cx="-50" cy="-20" rx="35" ry="30" fill="white"/>
    <circle cx="-60" cy="-15" r="18" fill="#2A1800"/>
    <ellipse cx="50" cy="-20" rx="35" ry="30" fill="white"/>
    <circle cx="40" cy="-15" r="18" fill="#2A1800"/>
    
    <!-- Serene Smile -->
    <path d="M-40,85 Q0,105 40,85" stroke="#B06840" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Bindi -->
    <circle cx="0" cy="-60" r="8" fill="#C0392B"/>
    
    <!-- Light Trails/Aura -->
    <path d="M-150,0 Q-200,-50 -250,0" stroke="#FFE87A" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M150,0 Q200,-50 250,0" stroke="#FFE87A" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Soft Vignette -->
  <rect width="100%" height="100%" fill="none" stroke="#3D2205" stroke-width="300" opacity="0.4"/>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD060" text-anchor="middle" letter-spacing="4">SHOT 9: FLASHBACK SMILE — 2:19–2:40 — MEMORY OF WARMTH</text>
</svg>