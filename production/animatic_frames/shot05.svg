<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Warm Intimate Background -->
  <rect width="100%" height="100%" fill="#3D2210"/>
  
  <!-- Subtle Bokeh/Light Glows -->
  <circle cx="960" cy="540" r="600" fill="#FFE87A" opacity="0.1"/>
  <circle cx="480" cy="300" r="300" fill="#F4E4C1" opacity="0.05"/>
  <circle cx="1440" cy="700" r="400" fill="#F4E4C1" opacity="0.05"/>

  <!-- KING'S EYE (Extreme Close-up - Left side) -->
  <g transform="translate(480, 540) scale(2.5)">
    <!-- Eye Area Skin -->
    <ellipse cx="0" cy="0" rx="200" ry="150" fill="#8B6340" opacity="0.4"/>
    <!-- Sclera -->
    <ellipse cx="0" cy="0" rx="120" ry="80" fill="white"/>
    <!-- Iris -->
    <circle cx="20" cy="0" r="65" fill="#3D2B1F"/>
    <!-- Pupil -->
    <circle cx="25" cy="-5" r="30" fill="#0D0500"/>
    <!-- Specular Highlight -->
    <circle cx="40" cy="-20" r="10" fill="white" opacity="0.8"/>
    <!-- Eyelids/Lashes -->
    <path d="M-130,0 Q0,-100 130,0" stroke="#1A0A00" stroke-width="4" fill="none"/>
    <path d="M-130,10 Q0,100 130,10" stroke="#1A0A00" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- TALEJU'S EYE (Extreme Close-up - Right side) -->
  <g transform="translate(1440, 540) scale(2.5)">
    <!-- Divine Aura for Eye -->
    <ellipse cx="0" cy="0" rx="180" ry="140" fill="#FFE87A" opacity="0.15"/>
    <!-- Sclera -->
    <ellipse cx="0" cy="0" rx="130" ry="90" fill="white"/>
    <!-- Iris (Divine Deep Brown) -->
    <circle cx="-20" cy="0" r="70" fill="#2A1800"/>
    <!-- Pupil -->
    <circle cx="-25" cy="-5" r="32" fill="#0A0400"/>
    <!-- Divine Sparkle -->
    <circle cx="-40" cy="-25" r="12" fill="white" opacity="0.9"/>
    <!-- Kohl Liner -->
    <path d="M-140,0 Q0,-110 140,0" stroke="#0A0400" stroke-width="6" fill="none"/>
    <path d="M-140,10 Q0,110 140,10" stroke="#0A0400" stroke-width="3" fill="none" opacity="0.7"/>
    <!-- Light Trail from eye -->
    <path d="M0,-80 Q-50,-150 -100,-120" stroke="#FFE87A" stroke-width="2" fill="none" opacity="0.4"/>
  </g>

  <!-- Central Connection Glow -->
  <rect x="955" y="200" width="10" height="680" fill="#FFE87A" opacity="0.2"/>
  <circle cx="960" cy="540" r="150" fill="#FFE87A" opacity="0.1"/>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD060" text-anchor="middle" letter-spacing="4">SHOT 5: INTIMACY PEAK — 0:50–1:13 — EYES MEETING</text>
</svg>