<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Transition Atmosphere (Lavender Mist + Dawn Gold) -->
  <rect width="100%" height="100%" fill="#1A2030"/>
  <rect width="100%" height="100%" fill="#C0B8E0" opacity="0.2"/> <!-- Lavender Dream -->
  
  <!-- Swelling Dawn Light (Right side) -->
  <radialGradient id="dawnSwell" cx="100%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#FFD4A3" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#FFD4A3" stop-opacity="0"/>
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#dawnSwell)"/>

  <!-- KING'S FACE (Extreme Close-up - Transition to Acceptance) -->
  <g transform="translate(960, 540) scale(4.0)">
    <!-- Face Skin (Desaturated transitioning to warm) -->
    <ellipse cx="0" cy="0" rx="140" ry="160" fill="#8B6340"/>
    <ellipse cx="0" cy="0" rx="140" ry="160" fill="#FFD4A3" opacity="0.1"/> <!-- Dawn glow hint -->

    <!-- Head/Hair (Messy, penitent) -->
    <path d="M-100,-130 Q-150,-180 0,-180 Q150,-180 100,-130" fill="#1A0A00"/>
    
    <!-- Eyes (Slowly opening or soft focus - Acceptance) -->
    <ellipse cx="50" cy="-20" rx="35" ry="25" fill="white"/>
    <circle cx="55" cy="-15" r="18" fill="#3D2B1F"/>
    <circle cx="58" cy="-13" r="10" fill="#0D0500"/>
    <circle cx="62" cy="-10" r="4" fill="white" opacity="0.6"/> <!-- Soft peace highlight -->
    
    <ellipse cx="-50" cy="-20" rx="35" ry="25" fill="white"/>
    <circle cx="-45" cy="-15" r="18" fill="#3D2B1F"/>
    <circle cx="-42" cy="-13" r="10" fill="#0D0500"/>

    <!-- Brows (Relaxing from furrows) -->
    <path d="M20,-50 Q50,-60 80,-50" stroke="#1A0A00" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M-80,-50 Q-50,-60 -20,-50" stroke="#1A0A00" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- Peace Smile (Subtle) -->
    <path d="M-35,90 Q0,105 35,90" stroke="#3A1A08" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    
    <!-- Single Tear of Peace (Reference sheet detail) -->
    <path d="M55,10 Q58,30 57,45" stroke="#9BB3CC" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Divine Presence Glow (Taleju's Instruction) -->
  <circle cx="960" cy="400" r="400" fill="#FFE87A" opacity="0.05"/>

  <!-- Production Data -->
  <rect x="0" y="1000" width="1920" height="80" fill="#000" opacity="0.7"/>
  <text x="50%" y="1055" font-family="Arial, serif" font-size="42" fill="#FFD4A3" text-anchor="middle" letter-spacing="4">SHOT 14: DREAM PEAK — 3:58–4:11 — DIVINE INSTRUCTION</text>
</svg>